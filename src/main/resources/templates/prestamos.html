<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Gestión de Préstamos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" th:href="@{/images/solologo.png}">
        <link rel="stylesheet" th:href="@{/css/finanzas.css}">
        
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    </head>
    <body>

        <div th:replace="~{fragments/navbar :: navbar}"></div> 

        <div class="container mt-4">
            <h2 class="text-center mb-4">Gestión de Préstamos</h2>

            <div class="d-flex justify-content-between align-items-center mt-3 mb-3 flex-wrap">
                <button class="btn btn-primary mb-2 mb-md-0" id="btnNuevo">+ Nuevo Préstamo</button>

                <!-- 🔸 Botón Exportar Todo eliminado -->

                <form method="get" th:action="@{/prestamos}" class="d-flex" style="max-width: 320px;">
                    <input type="text" name="search" th:value="${search}" 
                           class="form-control form-control-sm me-2" 
                           placeholder="Buscar por cliente, código o # préstamo">
                    <button type="submit" class="btn btn-outline-primary btn-sm">Buscar</button>        
                </form>
            </div>

            <table class="table table-bordered table-striped">
                <thead class="table-dark text-center">
                    <tr>
                        <th>ID</th>
                        <th>Código Cliente</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Monto</th>
                        <th>Días</th>
                        <th>Cuota Diaria</th>
                        <th>Total a Pagar</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="prestamo : ${prestamos}">
                        <td th:text="${prestamo.id}"></td>
                        <td th:text="${prestamo.cliente.codigoCliente}"></td>
                        <td th:text="${prestamo.cliente.nombreCompleto}"></td>
                        <td th:text="${prestamo.fecha}"></td>
                        <td th:text="${prestamo.monto}"></td>
                        <td th:text="${prestamo.dias}"></td>
                        <td th:text="${prestamo.cuotaDiaria}"></td>
                        <td th:text="${prestamo.totalPagar}"></td>
                        <td>
                            <button class="btn btn-warning btn-sm btnEditar" 
                                    th:data-id="${prestamo.id}">Editar</button>
                            <a th:href="@{'/prestamos/eliminar/' + ${prestamo.id}}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Seguro que deseas eliminar este préstamo?')">Eliminar</a>
                            <button class="btn btn-secondary btn-sm"
                                    th:onclick="'window.location.href=\'/prestamos/pdf/' + ${prestamo.id} + '\''">
                                <i class="bi bi-file-earmark-pdf"></i> Contrato
                            </button>
                            <button class="btn btn-info btn-sm"
                                    th:onclick="'verCronograma(' + ${prestamo.id} + ')'">
                                Ver Cronograma
                            </button>
                            <!-- 🔸 Botón Exportar Excel eliminado -->
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal préstamo -->
        <div class="modal fade" id="modalPrestamo" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form id="formPrestamo" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="id" id="id">

                        <div class="modal-header bg-primary text-white">
                            <h5 class="modal-title" id="tituloModal">Nuevo Préstamo</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body">
                            <label class="form-label mt-2">ID Préstamo (Opcional):</label>
                            <input type="number" class="form-control" id="idPrestamo">
                            
                            <label class="form-label">Cliente:</label>
                            <select name="cliente.id" class="form-select select2" id="clienteSelect" required>
                                <option value="">Seleccione un cliente...</option>
                                <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nombreCompleto}"></option>
                            </select>

                            <label class="form-label mt-2">Monto:</label>
                            <input type="number" name="monto" class="form-control" id="monto" required>

                            <label class="form-label mt-2">Días:</label>
                            <select name="dias" id="dias" class="form-select" required>
                                <option value="20">20 días</option>
                                <option value="24">24 días</option>
                            </select>

                            <label class="form-label mt-2">Fecha:</label>
                            <input type="date" name="fecha" class="form-control" id="fecha">

                            <div class="alert alert-info mt-3" id="infoCalculo">
                                Total a pagar: <span id="totalPagar">0</span><br>
                                Cuota diaria: <span id="cuotaDiaria">0</span>
                            </div>

                            <!-- Método de Entrega -->
                            <label class="form-label mt-2">Método de Entrega:</label>
                            <select name="metodoEntrega" id="metodoEntrega" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option value="efectivo">Efectivo</option>
                                <option value="transferencia">Transferencia</option>
                                <option value="mixto">Mixto</option>
                            </select>

                            <!-- Monto Efectivo -->
                            <div id="campoEfectivoPrestamo" class="mt-2" style="display:none;">
                                <label class="form-label">Monto en Efectivo:</label>
                                <input type="number" name="montoEfectivo" id="montoEfectivo" class="form-control" step="0.01">
                            </div>

                            <!-- Monto Transferencia -->
                            <div id="campoTransferenciaPrestamo" class="mt-2" style="display:none;">
                                <label class="form-label">Monto en Transferencia:</label>
                                <input type="number" name="montoTransferencia" id="montoTransferencia" class="form-control" step="0.01">

                                <label class="form-label mt-2">Banco:</label>
                                <select name="bancoEntrega" id="bancoEntrega" class="form-select">
                                    <option value="">Seleccione...</option>
                                    <option value="BCP">BCP</option>
                                    <option value="Interbank">Interbank</option>
                                    <option value="Plin">Plin</option>
                                </select>
                            </div>

                        </div>

                        <div class="modal-footer">
                            <button type="submit" class="btn btn-success">Guardar</button>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- ============================= -->
        <!-- 🧾 MODAL VISTA CRONOGRAMA -->
        <!-- ============================= -->
        <div class="modal fade" id="modalCronograma" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-info text-white">
                        <h5 class="modal-title">Cronograma del Préstamo</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="table-responsive">
                            <table class="table table-bordered table-striped text-center">
                                <thead class="table-dark">
                                    <tr>
                                        <th># Cuota</th>
                                        <th>Fecha Programada</th>
                                        <th>Capital</th>
                                        <th>Interés</th>
                                        <th>Total</th>
                                        <th>Monto Pagado</th>
                                        <th>Saldo Pendiente</th>
                                        <th>Estado</th>
                                        <th>Efectivo</th>
                                        <th>Transferencia</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaCronograma">
                                    <tr>
                                        <td colspan="10" class="text-center">Cargando...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scripts -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

        <script>
            $('#formPrestamo').on('submit', async function (e) {
                e.preventDefault();

                const tipo = $('#metodoEntrega').val();
                const montoTotal = parseFloat($('#monto').val()) || 0;

                // Ajustar montos según el método
                if (tipo === 'efectivo') {
                    $('#montoEfectivo').val(montoTotal.toFixed(2));
                    $('#montoTransferencia').val(0);
                } else if (tipo === 'transferencia') {
                    $('#montoEfectivo').val(0);
                }
                
                // 🔹 Tomar el ID manual si el usuario escribió uno
                const idManual = $('#idPrestamo').val();

                if (idManual) {
                    $('#id').val(idManual); // lo pasa al hidden
                }

                // 🔹 Ahora sí crear el formData
                const formData = new FormData(this);

                try {
                    const token = document.querySelector('meta[name="_csrf"]').content;
                    const header = document.querySelector('meta[name="_csrf_header"]').content;

                    const resp = await fetch('/prestamos/guardar', {
                        method: 'POST',
                        headers: {
                            [header]: token
                        },
                        body: formData
                    });

                    const msg = await resp.text();

                    if (resp.ok) {
                        // ✅ Éxito: préstamo guardado
                        Swal.fire({
                            icon: 'success',
                            title: 'Préstamo registrado',
                            text: msg,
                            confirmButtonText: 'OK',
                            confirmButtonColor: '#28a745',
                            allowOutsideClick: true,
                        }).then(() => {
                            const modal = bootstrap.Modal.getInstance(document.getElementById('modalPrestamo'));
                            modal.hide();
                            $('#formPrestamo')[0].reset();
                            $('#clienteSelect').val('').trigger('change');
                        });
                    } else {
                        // ⚠️ Error controlado (por ejemplo fondos insuficientes)
                        Swal.fire({
                            icon: 'warning',
                            title: 'No se pudo realizar el préstamo',
                            text: msg,
                            confirmButtonText: 'OK',
                            confirmButtonColor: '#f0ad4e',
                            allowOutsideClick: true,
                        });
                    }

                } catch (err) {
                    // ❌ Error del servidor o red
                    Swal.fire({
                        icon: 'error',
                        title: 'Error de conexión',
                        text: 'No se pudo contactar con el servidor.',
                        confirmButtonText: 'OK',
                        confirmButtonColor: '#d33',
                        allowOutsideClick: true,
                    });
                }
            });
            
            $(document).ready(function () {
            const modal = new bootstrap.Modal(document.getElementById('modalPrestamo'));
            const interes = 0.20;

            $('.select2').select2({ dropdownParent: $('#modalPrestamo') });

            function calcular() {
            let monto = parseFloat($('#monto').val()) || 0;
            let dias = parseInt($('#dias').val()) || 1;
            let total = monto + (monto * interes);
            let cuota = (total / dias).toFixed(2);
            $('#totalPagar').text(total.toFixed(2));
            $('#cuotaDiaria').text(cuota);
            }

            $('#monto, #dias').on('input change', calcular);

            $('#btnNuevo').click(function () {
            $('#formPrestamo').attr('action', '/prestamos/guardar');
            $('#formPrestamo').attr('method', 'post'); // 🔹 Asegura POST
            $('#tituloModal').text('Nuevo Préstamo');
            $('#formPrestamo')[0].reset();
            $('#clienteSelect').val('').trigger('change');
            $('#id').val('');
            $('#fecha').val(new Date().toISOString().split('T')[0]);
            calcular();
            modal.show();
            });

            $('.btnEditar').click(function () {
            const id = $(this).data('id');
            $.get('/prestamos/editar/' + id, function (data) {
            $('#tituloModal').text('Editar Préstamo');
            $('#formPrestamo').attr('action', '/prestamos/actualizar');
            $('#formPrestamo').attr('method', 'post');

            $('#id').val(data.id);
            $('#monto').val(data.monto);
            $('#dias').val(data.dias);
            $('#fecha').val(data.fecha);
            $('#clienteSelect').val(data.clienteId).trigger('change');
            $('#totalPagar').text(data.totalPagar.toFixed(2));
            $('#cuotaDiaria').text(data.cuotaDiaria.toFixed(2));
            $('#metodoEntrega').val(data.metodoEntrega).trigger('change');

            if (data.montoEfectivo)
            $('#montoEfectivo').val(data.montoEfectivo);
            if (data.montoTransferencia)
            $('#montoTransferencia').val(data.montoTransferencia);
            if (data.bancoEntrega)
            $('#bancoEntrega').val(data.bancoEntrega);

            modal.show();
            });
            });

            $('#fecha').val(new Date().toISOString().split('T')[0]);
            });

            async function generarCronograma(prestamoId) {
            if (!confirm("¿Deseas generar o regenerar el cronograma para este préstamo?")) return;
            const resp = await fetch(`/api/cronogramas/generar/${prestamoId}`, { method: "POST" });
            if (resp.ok) alert("Cronograma generado correctamente ✅");
            else alert("Error al generar el cronograma ❌");
            }

            // 🔹 Modal visualizar cronograma
            async function verCronograma(prestamoId) {
            const modal = new bootstrap.Modal(document.getElementById('modalCronograma'));
            const tbody = document.getElementById('tablaCronograma');
            tbody.innerHTML = `<tr><td colspan="10">Cargando...</td></tr>`;

            try {
            const resp = await fetch(`/api/cronogramas/prestamo/${prestamoId}`);
            if (!resp.ok) throw new Error("Error al obtener cronograma");
            const data = await resp.json();

            if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10">No hay cuotas registradas</td></tr>`;
            } else {
            tbody.innerHTML = "";
            data.forEach(c => {
            const fila = `
            <tr>
            <td>${c.numeroCuota}</td>
            <td>${c.fechaProgramada || '-'}</td>
            <td>${(c.capital || 0).toFixed(2)}</td>
            <td>${(c.interes || 0).toFixed(2)}</td>
            <td>${(c.montoTotal || 0).toFixed(2)}</td>
            <td>${(c.montoPagado || 0).toFixed(2)}</td>
            <td>${(c.saldoPendiente || 0).toFixed(2)}</td>
            <td>${c.estado || '-'}</td>
            <td style="white-space: pre-line;">${c.detalleEfectivo || '-'}</td>
            <td style="white-space: pre-line;">${c.detalleTransferencia || '-'}</td>
            </tr>`;
            tbody.insertAdjacentHTML("beforeend", fila);
            });
            }
            modal.show();
            } catch (e) {
            console.error(e);
            tbody.innerHTML = `<tr><td colspan="10" class="text-danger">Error al cargar el cronograma</td></tr>`;
            modal.show();
            }
            }

            // 🔹 Mostrar campos según método de entrega (versión corregida)
            document.getElementById("metodoEntrega").addEventListener("change", () => {
            const tipo = document.getElementById("metodoEntrega").value;
            const campoEfectivo = document.getElementById("campoEfectivoPrestamo");
            const campoTransferencia = document.getElementById("campoTransferenciaPrestamo");
            const inputEfectivo = document.getElementById("montoEfectivo");
            const inputTransferencia = document.getElementById("montoTransferencia");
            const montoTotal = parseFloat(document.getElementById("monto").value) || 0;

            // 🔸 Ocultar todo por defecto
            campoEfectivo.style.display = "none";
            campoTransferencia.style.display = "none";
            inputEfectivo.value = "";
            inputTransferencia.value = "";

            if (tipo === "efectivo") {
            // Solo efectivo → no pide nada extra
            // No mostramos campos, solo se guarda el monto total como efectivo al enviar
            } 
            else if (tipo === "transferencia") {
            // Solo transferencia → solo mostrar banco
            campoTransferencia.style.display = "block";
            inputTransferencia.value = montoTotal.toFixed(2);
            } 
            else if (tipo === "mixto") {
            // Mixto → mostrar ambos montos y el banco
            campoEfectivo.style.display = "block";
            campoTransferencia.style.display = "block";
            }
            });
        </script>

    </body>
</html>
