<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Gestión de Clientes</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" th:href="@{/images/solologo.png}">
        <link rel="stylesheet" th:href="@{/css/clientes.css}">
    </head>
    <body>
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="container mt-4">
            <h2 class="text-center mb-4">Gestión de Clientes</h2>

            <div class="d-flex justify-content-between align-items-center mt-3 mb-3 flex-wrap">
                <button class="btn btn-primary mb-2 mb-md-0" data-bs-toggle="modal" data-bs-target="#crearModal">+ Nuevo Cliente</button>

                <form method="get" th:action="@{/clientes}" class="d-flex" style="max-width: 320px;">
                    <input type="text" name="search" th:value="${search}"
                           class="form-control form-control-sm me-2"
                           placeholder="Buscar por nombre o código (ej: CLI_001)">
                    <button type="submit" class="btn btn-outline-primary btn-sm">Buscar</button>
                </form>
            </div>

            <!-- Tabla de clientes -->
            <table class="table table-striped table-hover shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre completo</th>
                        <th>Tipo doc.</th>
                        <th>Número doc.</th>
                        <th>Teléfono</th>
                        <th>Dirección</th>
                        <th>Empleado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.id}"></td>
                        <td th:text="${cliente.nombreCompleto}"></td>
                        <td th:text="${cliente.tipoDocumento}"></td>
                        <td th:text="${cliente.numeroDocumento}"></td>
                        <td th:text="${cliente.telefono}"></td>
                        <td th:text="${cliente.direccion}"></td>
                        <!-- ✅ Cambio principal: de empleadoId a empleado.nombreCompleto -->
                        <td th:text="${cliente.empleado != null ? cliente.empleado.nombreCompleto : 'Sin asignar'}"></td>
                        <td>
                            <button class="btn btn-sm btn-primary"
                                    data-bs-toggle="modal"
                                    data-bs-target="#editarModal"
                                    th:attr="data-id=${cliente.id},
                                    data-nombre=${cliente.nombreCompleto},
                                    data-tipo=${cliente.tipoDocumento},
                                    data-numero=${cliente.numeroDocumento},
                                    data-telefono=${cliente.telefono},
                                    data-direccion=${cliente.direccion},
                                    data-empleado=${cliente.empleado != null ? cliente.empleado.id : ''}">
                                Editar
                            </button>
                            <button class="btn btn-sm btn-danger"
                                    onclick="confirmarEliminar([[${cliente.id}]])">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- MODAL CREAR -->
        <div class="modal fade" id="crearModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <form th:action="@{/clientes/guardar}" method="post" enctype="multipart/form-data">
                        <div class="modal-header bg-success text-white">
                            <h5 class="modal-title">Nuevo Cliente</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body row g-3">
                            
                            <div class="col-md-3">
                                <label class="form-label">ID (opcional)</label>
                                <input name="id" type="number" class="form-control">
                                <small class="text-muted">Solo usar para migración</small>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Nombre completo</label>
                                <input name="nombreCompleto" class="form-control" required>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Tipo documento</label>
                                <input name="tipoDocumento" class="form-control">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Número documento</label>
                                <input name="numeroDocumento" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Teléfono</label>
                                <input name="telefono" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Dirección</label>
                                <input name="direccion" class="form-control">
                            </div>

                            <!-- ✅ Cambio: name="empleado.id" -->
                            <div class="col-md-4">
                                <label class="form-label">Empleado asignado</label>
                                <select name="empleado.id" class="form-select" required>
                                    <option value="">Seleccione...</option>
                                    <option th:each="empleado : ${empleados}"
                                            th:value="${empleado.id}"
                                            th:text="${empleado.nombreCompleto}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Firma del cliente</label>
                                <input type="file" name="firma" class="form-control" accept="image/*">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Información adicional (PDF)</label>
                                <input type="file" name="infoPdf" class="form-control" accept="application/pdf">
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="submit" class="btn btn-success">Guardar</button>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- MODAL EDITAR -->
        <div class="modal fade" id="editarModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <form th:action="@{/clientes/guardar}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="id" id="edit-id">
                        <div class="modal-header bg-primary text-white">
                            <h5 class="modal-title">Editar Cliente</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre completo</label>
                                <input name="nombreCompleto" id="edit-nombre" class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Tipo documento</label>
                                <input name="tipoDocumento" id="edit-tipo" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Número documento</label>
                                <input name="numeroDocumento" id="edit-numero" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Teléfono</label>
                                <input name="telefono" id="edit-telefono" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Dirección</label>
                                <input name="direccion" id="edit-direccion" class="form-control">
                            </div>

                            <!-- ✅ Cambio: name="empleado.id" -->
                            <div class="col-md-4">
                                <label class="form-label">Empleado asignado</label>
                                <select name="empleado.id" id="edit-empleado" class="form-select" required>
                                    <option value="">Seleccione...</option>
                                    <option th:each="empleado : ${empleados}"
                                            th:value="${empleado.id}"
                                            th:text="${empleado.nombreCompleto}"></option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Reemplazar firma (opcional)</label>
                                <input type="file" name="firma" accept="image/*" class="form-control">
                                <small class="text-muted">Si no seleccionas archivo, se mantiene la firma actual.</small>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Información adicional (PDF)</label>
                                <input type="file" name="infoPdf" class="form-control" accept="application/pdf">
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary">Actualizar</button>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            // Rellenar modal de edición
            const editarModal = document.getElementById('editarModal');
            editarModal.addEventListener('show.bs.modal', event => {
            const button = event.relatedTarget;
            document.getElementById('edit-id').value = button.getAttribute('data-id');
            document.getElementById('edit-nombre').value = button.getAttribute('data-nombre');
            document.getElementById('edit-tipo').value = button.getAttribute('data-tipo');
            document.getElementById('edit-numero').value = button.getAttribute('data-numero');
            document.getElementById('edit-telefono').value = button.getAttribute('data-telefono');
            document.getElementById('edit-direccion').value = button.getAttribute('data-direccion');
            document.getElementById('edit-empleado').value = button.getAttribute('data-empleado');
            });

            // Confirmar eliminación
            function confirmarEliminar(id) {
            if (confirm("¿Seguro que deseas eliminar este cliente?")) {
            window.location.href = `/clientes/eliminar/${id}`;
            }
            }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
