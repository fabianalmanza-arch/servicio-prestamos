<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Préstamos</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Poppins', sans-serif;
    }

    .card-login {
        width: 100%;
        max-width: 400px;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        background: white;
    }

    .titulo {
        font-weight: 600;
        text-align: center;
        margin-bottom: 20px;
    }

    .btn-primary {
        border-radius: 10px;
    }
</style>
```

</head>

<body>

<div class="card-login">

```
<h3 class="titulo">🔐 Iniciar Sesión</h3>

<!-- 🔴 Error -->
<div th:if="${param.error}" class="alert alert-danger text-center">
    Usuario o contraseña incorrectos
</div>

<!-- 🟢 Logout -->
<div th:if="${param.logout}" class="alert alert-success text-center">
    Sesión cerrada correctamente
</div>

<form th:action="@{/login}" method="post">

    <!-- Usuario -->
    <div class="mb-3">
        <label class="form-label">Usuario</label>
        <div class="input-group">
            <input type="text" name="correo" class="form-control" required placeholder="ej: fabian">
            <span class="input-group-text">@gmail.com</span>
        </div>
    </div>

    <!-- Contraseña -->
    <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <!-- Recordar -->
    <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="recordar">
        <label class="form-check-label">Recordar usuario</label>
    </div>

    <!-- Botón -->
    <button class="btn btn-primary w-100">Ingresar</button>

</form>
```

</div>

<!-- Script recordar usuario -->

<script>
    const inputCorreo = document.querySelector('input[name="correo"]');
    const checkbox = document.getElementById('recordar');

    // Cargar usuario guardado
    window.addEventListener('load', () => {
        const guardado = localStorage.getItem('correo');
        if (guardado) {
            inputCorreo.value = guardado.replace('@gmail.com', '');
            checkbox.checked = true;
        }
    });

    // Guardar al enviar
    document.querySelector('form').addEventListener('submit', () => {
        if (checkbox.checked) {
            localStorage.setItem('correo', inputCorreo.value);
        } else {
            localStorage.removeItem('correo');
        }
    });
</script>

</body>
</html>
